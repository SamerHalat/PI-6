#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
# Ativa o alvo experimental do Compose para Web (Corrige o erro de jscanvas)
org.jetbrains.compose.experimental.jscanvas.enabled=true

# Silencia o aviso de incompatibilidade entre o Kotlin e o AGP 8.11.2
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true

# Oculta o aviso sobre os alvos de iOS estarem desativados no Windows
kotlin.native.ignoreDisabledTargets=true